legal:
  cgu:
    privacy:
      title: Protection des données personnelles
      intro: Conformément au Règlement général sur la protection des données (RGPD), RapproFam s'engage à protéger la vie privée de ses membres et à traiter les données personnelles avec transparence.
      controller_title: Responsable du traitement
      controller_body: 'Le responsable du traitement est <strong>SOUFFOUMADI Anissoir</strong>, domicilié au %address%. Contact : <a href="mailto:%email%">%email%</a>. RapproFam est un projet personnel, développé par passion, sans activité commerciale.'
      nature_title: Finalité du site
      nature_body: RapproFam offre un espace privé dédié aux membres d'une même famille pour partager des événements (mariages, fêtes, réunions…) et organiser des rencontres familiales. Le service n'est pas destiné à d'autres types de mise en relation.
      collection_title: Données collectées
      collection_body: 'Selon les fonctionnalités utilisées : identifiants de compte (adresse e-mail, mot de passe stocké de manière sécurisée, prénom, nom, pseudo optionnel, langue d''interface) ; connexion Google (identifiant Google et e-mail associé) ; profil (photo optionnelle, recadrage, visibilité) ; contenus publiés (groupes familiaux, événements avec titres, dates, lieux, descriptions et photos, messages privés et messages de groupe) ; préférences (notifications e-mail pour les messages privés, choix de consentement cookies) ; formulaire contact réservé aux membres connectés (objet et message) ; données techniques (dates de connexion, jetons temporaires pour vérification d''e-mail, changement ou réinitialisation de mot de passe, suppression de compte). Aucune « ville de résidence » n''est demandée.'
      purposes_title: Finalités du traitement
      purposes_body: 'Création et gestion du compte ; organisation et partage d''événements familiaux au sein de groupes privés ; messagerie entre membres autorisés ; invitations et demandes d''adhésion aux groupes ; modération et sécurité de la plateforme ; envoi d''e-mails transactionnels (confirmation, alertes, avertissements) ; mesure d''audience et publicité en ligne uniquement si vous y consentez ; amélioration du service.'
      legal_basis_title: Bases légales
      legal_basis_body: 'Exécution du contrat (inscription et utilisation du service) ; intérêt légitime (sécurité, prévention du spam, modération) ; consentement (cookies de mesure d''audience et publicitaires, notifications e-mail optionnelles) ; obligations légales le cas échéant.'
      third_parties_title: Destinataires et sous-traitants
      third_parties_body: 'Des données peuvent être traitées par : <strong>Google</strong> (connexion OAuth, reCAPTCHA v3 sur le formulaire contact, Google Analytics si accepté, Google AdSense si accepté) — <a href="https://policies.google.com/privacy" rel="noopener noreferrer" target="_blank">politique de confidentialité Google</a> ; le <strong>prestataire d''envoi d''e-mails</strong> (SMTP) pour les messages transactionnels et le formulaire contact ; <strong>PayPal</strong> si vous utilisez le lien de don volontaire dans le pied de page (site externe, soumis à la politique PayPal). L''hébergeur du site stocke les données techniques nécessaires au fonctionnement.'
      cookies_title: Cookies et traceurs
      cookies_body: 'Des cookies strictement nécessaires (session, sécurité CSRF, langue, mémorisation de connexion, enregistrement de vos choix cookies) sont déposés sans consentement. Les cookies de mesure d''audience (Google Analytics) et publicitaires (Google AdSense) ne sont activés qu''après votre accord via le bandeau ou « Gérer les cookies » dans le pied de page. Le détail des catégories figure dans la fenêtre de préférences cookies.'
      adsense_title: Publicité en ligne (AdSense)
      adsense_body: 'Le site peut afficher des publicités via Google AdSense pour contribuer aux frais d''hébergement. Des cookies tiers peuvent être utilisés pour la mesure et la personnalisation publicitaire. Les emplacements publicitaires et les cookies associés ne sont activés qu''après votre accord via la catégorie « cookies publicitaires » du bandeau ou de « Gérer les cookies ».'
      retention_title: Durées de conservation
      retention_body: 'Données de compte : conservées tant que le compte est actif ; après confirmation de suppression, effacement définitif sous 3 mois. Messages : fils anciens supprimés automatiquement après 12 mois. Événements passés : données associées purgées après 10 mois. Comptes inactifs : avertissements par e-mail puis suppression selon les règles configurées sur la plateforme. Jetons temporaires (vérification, mot de passe, suppression) : durée limitée (de quelques minutes à quelques heures). Choix cookies : 6 mois.'
      rights_title: Vos droits
      rights_body: 'Vous disposez d''un droit d''accès, de rectification, d''effacement, de limitation, d''opposition et de portabilité concernant vos données personnelles. Vous pouvez retirer votre consentement cookies à tout moment via « Gérer les cookies ». Pour exercer vos droits, contactez l''éditeur à l''adresse ci-dessous.'
      cnil_title: Réclamation
      cnil_body: 'Vous pouvez introduire une réclamation auprès de la CNIL (Commission nationale de l''informatique et des libertés) : <a href="https://www.cnil.fr" rel="noopener noreferrer" target="_blank">www.cnil.fr</a>.'
      transfers_title: Transferts hors Union européenne
      transfers_body: 'Certains prestataires (notamment Google) peuvent traiter des données en dehors de l''Union européenne. Google propose des garanties contractuelles (clauses types) pour encadrer ces transferts.'
      contact_body: 'Pour toute question relative à vos données personnelles, écrivez à'
    terms:
      title: Conditions Générales d'Utilisation
      purpose_title: Objet du service
      purpose_body: RapproFam est une plateforme privée de mise en relation familiale. Elle permet de créer des groupes, publier des événements (mariages, fêtes, réunions…) et échanger via la messagerie. L'accès au contenu des membres est réservé aux utilisateurs connectés et autorisés.
      scope_title: Périmètre d'utilisation
      scope_body: Le service est exclusivement destiné au partage d'événements et à l'organisation de rencontres au sein de la famille. RapproFam n'est pas un site de rencontre généraliste ni une place de marché. Toute utilisation détournée ou contraire à cet esprit familial peut entraîner une suspension du compte.
      account_title: Compte et inscription
      account_body: 'L''inscription requiert une adresse e-mail valide et l''acceptation des présentes CGU. La vérification de l''e-mail peut être demandée. La connexion via Google est possible ; un complément d''inscription peut être requis. Vous êtes responsable de la confidentialité de vos identifiants.'
      user_resp_title: Responsabilité de l'utilisateur
      user_resp_body: L'utilisateur est seul responsable du contenu qu'il publie (textes, photos, messages). Sont interdits les contenus haineux, diffamatoires, illicites ou portant atteinte à la vie privée d'autres membres. Les photos et informations partagées doivent respecter le cercle familial concerné.
      moderation_title: Modération et sanctions
      moderation_body: Les responsables de groupes et l'équipe de modération peuvent avertir, suspendre ou exclure un membre en cas de non-respect des règles. Des avertissements progressifs sur la plateforme peuvent conduire à la suppression définitive du compte. Les décisions de modération peuvent faire l'objet d'un contact par e-mail avec l'équipe.
      publisher_resp_title: Responsabilité de l'éditeur
      publisher_resp_body: RapproFam est un projet personnel développé bénévolement pour améliorer le quotidien des familles. SOUFFOUMADI Anissoir ne pourra être tenu responsable des contenus publiés par les membres, des fausses informations qu'ils échangent entre eux, ni des dommages indirects liés à l'utilisation du site. L'éditeur s'efforce de maintenir un service disponible et sécurisé, sans garantie d'un fonctionnement ininterrompu.
      ip_title: Propriété intellectuelle
      ip_body: Les photos et textes publiés par les membres restent leur propriété. En publiant, l'utilisateur concède à RapproFam le droit d'afficher ces contenus uniquement sur la plateforme, pour les membres autorisés. La structure du site (design, logo, code) reste la propriété de l'éditeur.
      changes_title: Modification des CGU
      changes_body: Les présentes CGU peuvent être mises à jour pour refléter l'évolution du service ou la réglementation. En cas de modification substantielle, les membres en seront informés lors de leur prochaine connexion ou par e-mail si nécessaire. La poursuite de l'utilisation du site vaut acceptation des CGU en vigueur.
      law_title: Droit applicable
      law_body: Les présentes CGU sont soumises au droit français. En cas de litige, et à défaut de résolution amiable, les tribunaux français seront seuls compétents.
  mentions:
    editor:
      title: 1. Édition du site
      intro: 'En vertu de l''article 6 de la loi n° 2004-575 du 21 juin 2004 pour la confiance dans l''économie numérique, il est précisé aux utilisateurs du site <strong>RapproFam</strong> l''identité des différents intervenants dans le cadre de sa réalisation et de son suivi :'
      owner: 'Propriétaire & Éditeur :'
      owner_name: SOUFFOUMADI Anissoir
      address: 'Adresse :'
      contact: 'Contact :'
      director: 'Directeur de la publication :'
      director_name: SOUFFOUMADI Anissoir
      status: 'Statut :'
      status_body: Projet personnel développé par passion, sans activité commerciale. RapproFam n'est pas une entreprise.
    nature:
      title: 2. Objet du site
      body: RapproFam est un espace privé dédié aux membres d'une famille pour partager des événements et organiser des rencontres familiales (mariages, fêtes, réunions…). Le site n'a pas vocation à accueillir d'autres types de mise en relation.
    hosting:
      title: 3. Hébergement
      intro: 'Le site est hébergé par :'
      provider: 'Prestataire :'
