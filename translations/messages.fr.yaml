cookie:
  banner:
    title: Respect de votre vie privée
    description: Nous utilisons des cookies nécessaires au fonctionnement du site. Avec votre accord, des cookies de mesure d'audience (Google Analytics) et publicitaires (Google AdSense) peuvent être activés.
    privacy_link: En savoir plus
    reject_all: Tout refuser
    customize: Personnaliser
    accept_all: Tout accepter
    actions_aria: Choix de consentement aux cookies
  preferences:
    title: Préférences cookies
    subtitle: Gérez vos choix à tout moment
    intro: Vous pouvez accepter ou refuser les cookies non essentiels. Les cookies strictement nécessaires ne peuvent pas être désactivés car ils assurent le fonctionnement du site.
    essential_details: Voir le détail des cookies nécessaires
    analytics_details: Voir le détail des cookies de mesure d'audience
    marketing_details: Voir le détail des cookies publicitaires
    reject_all: Refuser tout
    save: Enregistrer mes choix
  category:
    necessary:
      badge: Toujours actifs
      title: Cookies strictement nécessaires
      description: Indispensables à la connexion, à la sécurité et à vos préférences de langue. Ils ne nécessitent pas votre consentement.
    analytics:
      badge: Optionnels
      title: Cookies de mesure d'audience
      description: Permettent de mesurer la fréquentation du site via Google Analytics (pages vues, navigation anonymisée).
      hint: Désactivés par défaut. Aucun script Google Analytics n'est chargé tant que vous n'acceptez pas cette catégorie.
    marketing:
      badge: Optionnels
      title: Cookies publicitaires
      description: Permettent d'afficher des publicités pertinentes via Google AdSense.
      hint: Désactivés par défaut. Aucune annonce ni cookie publicitaire AdSense n'est activé tant que vous n'acceptez pas cette catégorie.
  optional:
    marketing_gads:
      name: __gads / __gpi
      purpose: Mesure et diffusion des annonces Google AdSense.
      duration: 13 mois maximum
    marketing_ide:
      name: IDE (doubleclick.net)
      purpose: Publicité ciblée et limitation de la fréquence d'affichage (Google).
      duration: 13 mois maximum
    analytics_ga:
      name: _ga / _ga_*
      purpose: Identifiant de visite anonyme (Google Analytics).
      duration: 13 mois maximum
    analytics_gid:
      name: _gid
      purpose: Distingue les visiteurs sur une courte période (Google Analytics).
      duration: 24 heures
  essential:
    session:
      name: Cookie de session
      purpose: Maintient votre connexion et sécurise votre navigation.
      duration: Durée de la session ou jusqu'à déconnexion.
    csrf:
      name: Cookies de sécurité (CSRF)
      purpose: Protège les formulaires contre les attaques cross-site.
      duration: Session ou courte durée selon l'action.
    locale:
      name: ef_locale
      purpose: Mémorise votre choix de langue (français / anglais).
      duration: 1 an
    remember:
      name: REMEMBERME
      purpose: Mémorise ta connexion si tu coches « Se souvenir de moi ».
      duration: Selon la configuration du site (connexion prolongée).
    consent:
      name: ef_consent
      purpose: Enregistre vos choix de consentement cookies.
      duration: 6 mois
