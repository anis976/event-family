      title: 4. Propriété intellectuelle
      body: SOUFFOUMADI Anissoir est propriétaire des droits de propriété intellectuelle sur la structure du site (logos, graphismes, icônes). Toute reproduction, représentation, modification, publication, adaptation de tout ou partie des éléments du site, quel que soit le moyen ou le procédé utilisé, est interdite, sauf autorisation écrite préalable.

