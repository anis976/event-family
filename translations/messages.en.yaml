cookie:
  banner:
    title: Your privacy matters
    description: We use cookies required for the site to work. With your consent, audience measurement cookies (Google Analytics) and, later, advertising cookies (Google AdSense) may be enabled.
    privacy_link: Learn more
    reject_all: Reject all
    customize: Customize
    accept_all: Accept all
    actions_aria: Cookie consent choices
  preferences:
    title: Cookie preferences
    subtitle: Manage your choices at any time
    intro: You can accept or reject non-essential cookies. Strictly necessary cookies cannot be disabled because they keep the site working.
    essential_details: View necessary cookie details
    analytics_details: View audience measurement cookie details
    reject_all: Reject all
    save: Save my choices
  category:
    necessary:
      badge: Always on
      title: Strictly necessary cookies
      description: Required for sign-in, security, and your language preference. They do not require your consent.
    analytics:
      badge: Optional
      title: Audience measurement cookies
      description: Measure site traffic via Google Analytics (page views, anonymized navigation).
      hint: Off by default. No Google Analytics script is loaded until you accept this category.
    marketing:
      badge: Optional
      title: Advertising cookies
      description: Allow relevant ads via Google AdSense (feature coming soon).
      hint: Off by default. No advertising script is loaded until you accept this category.
  optional:
    analytics_ga:
      name: _ga / _ga_*
      purpose: Anonymous visit identifier (Google Analytics).
      duration: Up to 13 months
    analytics_gid:
      name: _gid
      purpose: Distinguishes visitors over a short period (Google Analytics).
      duration: 24 hours
  essential:
    session:
      name: Session cookie
      purpose: Keeps you signed in and secures your browsing.
      duration: Session length or until sign-out.
    csrf:
      name: Security cookies (CSRF)
      purpose: Protects forms against cross-site attacks.
      duration: Session or short-lived depending on the action.
    locale:
      name: ef_locale
      purpose: Remembers your language choice (French / English).
      duration: 1 year
    remember:
      name: REMEMBERME
      purpose: Remembers your sign-in when you check "Remember me".
      duration: According to site settings (extended sign-in).
    consent:
      name: ef_consent
      purpose: Stores your cookie consent choices.
      duration: 6 months
