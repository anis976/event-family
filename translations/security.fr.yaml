"Invalid credentials.": "Adresse e-mail ou mot de passe incorrect."
"Invalid CSRF token.": "Session expirée. Recharge la page de connexion puis réessaie."
"Jeton CSRF invalide.": "Session expirée. Recharge la page de connexion puis réessaie."
"Ton compte n'est pas encore activé. Ouvre le lien reçu par e-mail pour confirmer ton adresse.": "Ton compte n'est pas encore activé. Ouvre le lien reçu par e-mail pour confirmer ton adresse."
