framework:
    rate_limiter:
        resend_verification:
            policy: sliding_window
            limit: 5
            interval: '15 minutes'
        password_reset_request:
            policy: sliding_window
            limit: 3
            interval: '15 minutes'
        password_reset_confirm:
            policy: sliding_window
            limit: 5
            interval: '15 minutes'
        account_deletion_request:
            policy: sliding_window
            limit: 2
            interval: '15 minutes'
        contact_form_hourly:
            policy: sliding_window
            limit: 5
            interval: '1 hour'
        contact_form_daily:
            policy: sliding_window
            limit: 20
            interval: '1 day'
